<!DOCTYPE html>
<html>
<head>
  <title>Connect Teens</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }

    .hero {
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #bbb;
      margin-bottom: 20px;
    }

    .btn {
      background: white;
      color: black;
      padding: 12px 25px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .section {
      padding: 50px 20px;
    }

    .product {
      border: 1px solid #333;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  CONNECT TEENS
</header>

<div class="hero">
  <h1>Clothing With Meaning</h1>
  <p>Built to bring people together.</p>
  <a class="btn" href="#shop">Shop Now</a>
</div>

<div class="section" id="shop">
  <h2>Our First Drop</h2>

  <div class="product">
    <h3>Connect Teens Hoodie</h3>
    <p>$45</p>
    <p>Simple. Clean. Purpose-driven.</p>
    <a class="btn" href="#">Order Now</a>
  </div>
</div>

<div class="section">
  <h2>About</h2>
  <p>
    Connect Teens is about bringing people together through simple, meaningful clothing.
  </p>
</div>

<footer>
  © 2026 Connect Teens
</footer>

</body>
</html>
